services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - banking-api
      - mobile-banking-api
      - wealth-management-api
      - internal-compliance-api
      - online-banking-portal
      - internal-admin-portal
      - online-banking-portal-staging
    networks:
      - acme-network
    restart: unless-stopped

  banking-api:
    image: ghcr.io/acme-bank-inc/banking-api:latest
    environment:
      - PORT=8080
      - ENV=production
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    networks:
      - acme-network
    restart: unless-stopped

  mobile-banking-api:
    image: ghcr.io/acme-bank-inc/mobile-banking-api:latest
    environment:
      - PORT=3000
      - ENV=production
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    networks:
      - acme-network
    restart: unless-stopped

  wealth-management-api:
    image: ghcr.io/acme-bank-inc/wealth-management-api:latest
    environment:
      - PORT=5000
      - ENV=production
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    networks:
      - acme-network
    restart: unless-stopped

  internal-compliance-api:
    image: ghcr.io/acme-bank-inc/internal-compliance-api:latest
    environment:
      - PORT=8000
      - ENV=production
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
    networks:
      - acme-network
    restart: unless-stopped

  online-banking-portal:
    image: ghcr.io/acme-bank-inc/online-banking-portal:latest
    networks:
      - acme-network
    restart: unless-stopped

  internal-admin-portal:
    image: ghcr.io/acme-bank-inc/internal-admin-portal:latest
    networks:
      - acme-network
    restart: unless-stopped

  online-banking-portal-staging:
    image: ghcr.io/acme-bank-inc/online-banking-portal:latest
    environment:
      - ENV=staging
    networks:
      - acme-network
    restart: unless-stopped

networks:
  acme-network:
    driver: bridge
